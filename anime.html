<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime — LUMIS</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #080808; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 44px;
      background: rgba(8,8,8,0.97);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
    }
    .topbar a {
      display: flex; align-items: center;
      text-decoration: none;
    }
    .topbar img { height: 32px; width: auto; filter: drop-shadow(0 0 6px rgba(201,168,76,0.3)); }
    .topbar-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.1); }
    .topbar-name {
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px; font-weight: 600;
      color: #C9A84C; letter-spacing: 0.05em;
    }
    .topbar-home {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px; color: #888; text-decoration: none;
      transition: color 0.2s; margin-left: auto;
    }
    .topbar-home:hover { color: #C9A84C; }

    .proxy-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; user-select: none;
      transition: border-color 0.2s;
    }
    .proxy-wrap:hover { border-color: #7A621C; }
    .proxy-wrap input { display: none; }
    .proxy-box {
      width: 13px; height: 13px;
      border: 1.5px solid #666; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .proxy-wrap input:checked ~ .proxy-box {
      background: #C9A84C; border-color: #C9A84C;
    }
    .proxy-wrap input:checked ~ .proxy-box::after {
      content: ''; display: block;
      width: 3px; height: 6px;
      border: 2px solid #080808;
      border-top: none; border-left: none;
      transform: rotate(45deg) translate(-1px,-1px);
    }
    .proxy-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px; color: #888; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .proxy-wrap input:checked ~ .proxy-label { color: #C9A84C; }

    iframe {
      position: fixed;
      top: 44px; left: 0; right: 0; bottom: 0;
      width: 100%; height: calc(100% - 44px);
      border: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html"><img src="images/logo.png" alt="LUMIS" /></a>
    <div class="topbar-sep"></div>
    <span class="topbar-name">Anime — Powered by Animetsu</span>
    <label class="proxy-wrap" title="Route through proxy">
      <input type="checkbox" id="proxy-cb" onchange="toggleProxy()" />
      <span class="proxy-box"></span>
      <span class="proxy-label">Proxy</span>
    </label>
    <a href="index.html" class="topbar-home">← Back to LUMIS</a>
  </div>
  <iframe
    id="frame"
    src="https://animetsu.cc/home"
    allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
    allowfullscreen>
  </iframe>
  <script>
    const PROXY = 'https://unblockedmovies.detlaffcameron.workers.dev/';
    const DIRECT = 'https://animetsu.cc/home';

    function toggleProxy() {
      const use = document.getElementById('proxy-cb').checked;
      document.getElementById('frame').src = use
        ? PROXY + '?url=' + encodeURIComponent(DIRECT)
        : DIRECT;
    }
  </script>
</body>
</html>
